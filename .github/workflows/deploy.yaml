
name: Deploy Node Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            APP_NAME="justservice24-backend"
            APP_DIR="/var/www/apps/$APP_NAME"
            REPO_URL="https://github.com/onexvorabusinesssolutions-coder/justservice24backend.git"

            # clone if not exists
            if [ ! -d "$APP_DIR" ]; then
              git clone -b main $REPO_URL $APP_DIR
            fi

            cd $APP_DIR

            # latest code
            git pull origin main

            # 🔥 create .env file (safe method)
            echo "PORT=${{ secrets.PORT }}" > .env
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "ADMIN_SECRET_KEY=${{ secrets.ADMIN_SECRET_KEY }}" >> .env
            echo "ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}" >> .env
            echo "MAIL_USER=${{ secrets.MAIL_USER }}" >> .env
            echo "MAIL_PASS=${{ secrets.MAIL_PASS }}" >> .env
            echo "RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}" >> .env
            echo "RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}" >> .env
            echo "REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}" >> .env
            echo "REACT_APP_RAZORPAY_KEY_ID=${{ secrets.REACT_APP_RAZORPAY_KEY_ID }}" >> .env

            echo ".env created successfully"

            # load node (if using nvm)
            source /etc/profile.d/nvm.sh || true

            # install deps
            npm ci

            # restart or start app
            if pm2 list | grep -q "$APP_NAME"; then
              pm2 restart "$APP_NAME" --update-env
            else
              pm2 start npm --name "$APP_NAME" -- start
            fi

            pm2 save

            echo "Deployment completed"
